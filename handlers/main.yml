- name: Grub update
  ansible.builtin.command: grub2-mkconfig -o /boot/grub2/grub.cfg
  changed_when: true
  failed_when: false
  notify: Set_reboot_required

- name: Restart timeservice
  ansible.builtin.systemd:
    name: "{{ suse15cis_time_sync_tool }}"
    state: restarted

- name: Reload systemctl
  ansible.builtin.systemd:
    daemon_reload: true
  listen: Systemd_daemon_reload

- name: Update Crypto Policy
  ansible.builtin.set_fact:
    suse15cis_full_crypto_policy: "{{ suse15cis_crypto_policy }}{{ suse15cis_crypto_policy_module }}{% if suse15cis_additional_crypto_policy_module | length > 0 %}:{{ suse15cis_additional_crypto_policy_module }}{% endif %}"
  notify: Set Crypto Policy

- name: Set Crypto Policy
  when: discovered_system_wide_crypto_policy.stdout != suse15cis_full_crypto_policy
  ansible.builtin.command: |
    update-crypto-policies --set "{{ suse15cis_full_crypto_policy }}"
  changed_when: true
  notify:
    - Set_reboot_required
    - Restart sshd

- name: Update dconf
  ansible.builtin.command: dconf update
  changed_when: true
  failed_when: false
  listen: Reload dconf

- name: Restart postfix
  ansible.builtin.service:
    name: postfix
    state: restarted

- name: Restart rsyslog
  ansible.builtin.systemd:
    name: rsyslog
    state: restarted

- name: Restart journald
  ansible.builtin.systemd:
    name: systemd-journald
    state: restarted

- name: Restart exim4
  ansible.builtin.systemd:
    name: exim4
    state: restarted

- name: Reload sysctl
  ansible.builtin.command: sysctl --system
  changed_when: true

- name: Flush ipv4 route table
  when: ansible_facts['virtualization_type'] != "docker"
  ansible.posix.sysctl:
    name: net.ipv4.route.flush
    value: '1'
    sysctl_set: true

- name: Flush ipv6 route table
  when:
    - ansible_facts['virtualization_type'] != "docker"
    - suse15cis_ipv6_required
  ansible.posix.sysctl:
    name: net.ipv6.route.flush
    value: '1'
    sysctl_set: true

- name: Auditd rules reload
  when:
    - not system_is_container
    - not discovered_auditd_immutable_check or
      "'No change' not in discovered_audit_rules_diff"
  ansible.builtin.command: augenrules --load
  changed_when: true
  listen: update auditd

- name: Audit_immutable_fact
  when:
    - discovered_audit_rules_updated.changed
    - auditd_immutable_check is defined
  ansible.builtin.debug:
    msg: "Reboot required for auditd to apply new rules as immutable set"
  notify: Set_reboot_required

- name: Stop auditd process
  when: not system_is_container
  ansible.builtin.command: systemctl kill auditd  # noqa command-instead-of-module
  changed_when: true
  listen: Restart auditd

- name: Start auditd process
  when: not system_is_container
  ansible.builtin.systemd_service:
    name: auditd
    state: started
  listen: Restart auditd

- name: Restart sshd
  ansible.builtin.systemd:
    name: sshd
    state: restarted

- name: Update pam-config
  when: suse15cis_use_pam_config
  ansible.builtin.command: pam-config --update
  changed_when: true

- name: Set_reboot_required
  ansible.builtin.set_fact:
    change_requires_reboot: true
