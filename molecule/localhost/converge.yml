---
# This is a playbook to test the tasks.
- name: Converge
  hosts: all
  become: true
  gather_facts: true

  vars:
      ansible_user: "{{ lookup('env', 'USER') }}"
      current_role_name: "{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') | basename }}"
      # Skip potentially disruptive tasks when running against a real local host
      suse15cis_disruption_high: false

  pre_tasks:
  tasks:
      - name: "Include tasks"
        ansible.builtin.include_role:
            name: "{{ current_role_name }}"
